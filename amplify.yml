version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install
        - nvm use
        - curl -fsSL https://bun.sh/install | bash
        - export PATH="$HOME/.bun/bin:$PATH"
        - bun --version
        - bun install --frozen-lockfile
    build:
      commands:
        - export PATH="$HOME/.bun/bin:$PATH"
        - env | grep -e NEXT_PUBLIC_ >> .env.production || true
        - bun run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - $HOME/.bun/**/*
